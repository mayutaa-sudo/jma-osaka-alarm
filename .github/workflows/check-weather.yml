name: Check Weather

on:
  schedule:
    - cron: '55 20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Python
        run: python check_warning.py

      - name: Commit result
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/warning.json
          git commit -m "Update warning status" || echo "No changes"
          git push
